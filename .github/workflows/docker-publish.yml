# Builds and publishes the Docker image to GHCR on every version tag.
name: Docker image

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          # No explicit :latest — metadata-action's default flavor
          # (latest=auto) adds it for semver tags that aren't prereleases,
          # so tagging v1.0.0-rc.1 can no longer repoint every :latest
          # puller at a prerelease. (A backport tag of an older line would
          # still take :latest — don't tag backports without revisiting
          # this.)
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
