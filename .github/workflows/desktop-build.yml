# Builds the desktop app for all three OSes on version tags and attaches
# the installers to the GitHub release.
name: Desktop app

on:
  push:
    tags: ['v*']

jobs:
  desktop:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile # workspace (web build needs it)
      - run: npm install
        working-directory: packages/desktop
      - run: npm run dist
        working-directory: packages/desktop
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/desktop/release/*.exe
            packages/desktop/release/*.dmg
            packages/desktop/release/*.AppImage
